<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Urban Livability Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/intro.js@7.2.0/introjs.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="map"></div>

    <!-- Floating Top Control Bar -->
    <div class="control-wrapper">
      <div
        class="search-bar-dock"
        data-step="1"
        data-intro="🔍 <b>Search & Control:</b> Search locations, toggle dark/light theme, or tune livability weights."
      >
        <div class="search-section-left">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="search-input"
            placeholder="Search street, coordinate, or area..."
            autocomplete="off"
          />
          <button id="clear-search" style="display: none">&times;</button>
        </div>
        <div class="divider"></div>
        <div class="utilities-section-right">
          <div
            class="map-theme-control"
            data-step="2"
            data-intro="🌓 <b>Theme Switcher:</b> Toggle between Light and Dark map styling."
          >
            <span class="theme-emoji">☀️</span>
            <label class="switch">
              <input type="checkbox" id="theme-toggle-checkbox" />
              <span class="switch-slider"></span>
            </label>
            <span class="theme-emoji">🌙</span>
          </div>
          <div class="inner-divider"></div>
          <button
            id="toggle-settings-btn"
            class="icon-btn"
            title="Configure Weights"
            data-step="3"
            data-intro="⌥ <b>Weights Engine:</b> Reveal weight sliders to adjust livability equations."
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="4" y1="21" x2="4" y2="14"></line>
              <line x1="4" y1="10" x2="4" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12" y2="3"></line>
              <line x1="20" y1="21" x2="20" y2="16"></line>
              <line x1="20" y1="12" x2="20" y2="3"></line>
              <line x1="1" y1="14" x2="7" y2="14"></line>
              <line x1="9" y1="8" x2="15" y2="8"></line>
              <line x1="17" y1="16" x2="23" y2="16"></line>
            </svg>
          </button>
        </div>
      </div>

      <div
        id="search-results"
        class="search-dropdown"
        style="display: none"
      ></div>

      <!-- Settings Dropdown Panel -->
      <div id="settings-tray" class="settings-dropdown-panel hidden">
        <div class="panel-section">
          <div class="panel-header">
            <h4>Prioritize Preferences</h4>
            <button
              id="reset-weights-btn"
              class="reset-icon-btn"
              title="Reset to default"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"
                ></path>
              </svg>
            </button>
          </div>

          <!-- Sliders -->
          <div class="slider-container-row">
            <span class="polar-emoji left-pole" title="Less connected">🚶</span>
            <div class="slider-wrapper-track">
              <input
                type="range"
                id="slider-utility"
                min="0"
                max="100"
                value="40"
                class="custom-range range-utility"
              />
            </div>
            <span class="polar-emoji right-pole" title="Transit Hub">🚇</span>
          </div>
          <div class="slider-container-row">
            <span class="polar-emoji left-pole" title="Urban Environment"
              >🧱</span
            >
            <div class="slider-wrapper-track">
              <input
                type="range"
                id="slider-green"
                min="0"
                max="100"
                value="30"
                class="custom-range range-green"
              />
            </div>
            <span class="polar-emoji right-pole" title="Lush parks">🌳</span>
          </div>
          <div class="slider-container-row">
            <span class="polar-emoji left-pole" title="Active streets">📢</span>
            <div class="slider-wrapper-track">
              <input
                type="range"
                id="slider-quietness"
                min="0"
                max="100"
                value="30"
                class="custom-range range-quiet"
              />
            </div>
            <span class="polar-emoji right-pole" title="Quiet streets">🤫</span>
          </div>
        </div>
      </div>
    </div>

    <!-- DEPENDENCY GRAPH -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Ultra-lightweight Pure JS Parquet Engine (No WASM 404 traps) -->
    <script src="https://cdn.jsdelivr.net/npm/hyparquet@0.4.1/dist/hyparquet.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/intro.js@7.2.0/intro.js"></script>
    <script src="script.js" type="module"></script>
  </body>
</html>
