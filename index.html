<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RentaBabu</title>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <!-- Intro.js CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/intro.js@7.2.0/introjs.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Fullscreen Map Canvas -->
    <div id="map"></div>

    <!-- Floating Top Control Bar -->
    <div class="control-wrapper">
      <div
        class="search-bar-dock"
        data-step="1"
        data-intro="🔍 <b>Search & Control:</b> Unified entry point. Search locations, toggle dark/light theme, or tune livability weights."
      >
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder="Search Mumbai street, coordinates, or area..."
          autocomplete="off"
        />
        <button id="clear-search" style="display: none">&times;</button>

        <div class="divider"></div>

        <!-- Light/Dark Map Toggle Switch -->
        <div
          class="map-theme-control"
          data-step="2"
          data-intro="🌓 <b>Theme Switcher:</b> Toggle between Light map canvas and high-contrast Dark map styling."
        >
          <span class="theme-emoji">☀️</span>
          <label class="switch">
            <input type="checkbox" id="theme-toggle-checkbox" />
            <span class="switch-slider"></span>
          </label>
          <span class="theme-emoji">🌙</span>
        </div>

        <div class="divider"></div>

        <!-- Settings Tray Button -->
        <button
          id="toggle-settings-btn"
          class="icon-btn"
          title="Configure Weights"
          data-step="3"
          data-intro="⌥ <b>Weights Engine:</b> Reveal weight sliders to adjust livability equations."
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="4" y1="21" x2="4" y2="14"></line>
            <line x1="4" y1="10" x2="4" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12" y2="3"></line>
            <line x1="20" y1="21" x2="20" y2="16"></line>
            <line x1="20" y1="12" x2="20" y2="3"></line>
            <line x1="1" y1="14" x2="7" y2="14"></line>
            <line x1="9" y1="8" x2="15" y2="8"></line>
            <line x1="17" y1="16" x2="23" y2="16"></line>
          </svg>
        </button>

        <!-- Autocomplete Results Tray -->
        <div
          id="search-results"
          class="search-dropdown"
          style="display: none"
        ></div>
      </div>

      <!-- Dropdown Settings Panel -->
      <div id="settings-tray" class="settings-dropdown-panel hidden">
        <div class="panel-section">
          <div class="panel-header">
            <h4>Prioritize Preferences</h4>
            <button
              id="reset-weights-btn"
              class="reset-icon-btn"
              title="Reset to default"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"
                ></path>
              </svg>
            </button>
          </div>

          <!-- Intuitive Dual-Polar Sliders -->
          <!-- Transit: Isolated/Walking vs Connected Metro -->
          <div class="slider-container-row">
            <span
              class="polar-emoji left-pole"
              title="Less connected / Isolated"
              >🚶</span
            >
            <div class="slider-wrapper-track">
              <input
                type="range"
                id="slider-utility"
                min="0"
                max="100"
                value="40"
                class="custom-range range-utility"
              />
            </div>
            <span
              class="polar-emoji right-pole"
              title="Highly connected / Transit Hub"
              >🚇</span
            >
          </div>

          <!-- Greenery: Concrete vs Lush Park -->
          <div class="slider-container-row">
            <span
              class="polar-emoji left-pole"
              title="Urban / Built environment"
              >🧱</span
            >
            <div class="slider-wrapper-track">
              <input
                type="range"
                id="slider-green"
                min="0"
                max="100"
                value="30"
                class="custom-range range-green"
              />
            </div>
            <span
              class="polar-emoji right-pole"
              title="Lush parks & green spaces"
              >🌳</span
            >
          </div>

          <!-- Quietness: Loud Horns vs Silent Peace -->
          <div class="slider-container-row">
            <span class="polar-emoji left-pole" title="Active / Noisy streets"
              >📢</span
            >
            <div class="slider-wrapper-track">
              <input
                type="range"
                id="slider-quietness"
                min="0"
                max="100"
                value="30"
                class="custom-range range-quiet"
              />
            </div>
            <span class="polar-emoji right-pole" title="Quiet & serene streets"
              >🤫</span
            >
          </div>
        </div>
      </div>
    </div>

    <!-- Script imports -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intro.js@7.2.0/intro.js"></script>
    <script src="script.js"></script>
  </body>
</html>
